# Nginx del FRONTEND en producción: sirve el build estático de la SPA (React) y
# proxya /api y /media al servicio `api` por la red interna de Docker.
#
# Sustituye al servidor de desarrollo de Vite (`npm run dev`), que NO debe usarse en
# producción. Con esto desaparece también el control de hosts de Vite: nginx sirve
# cualquier Host, así que el acceso por IP y por dominio funciona sin configurar nada.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Subidas: imágenes de artículos (hasta 5 MB) y HTML de ejercicios. El default de
    # nginx (1 MB) daría 413 al subirlas; lo ampliamos con margen.
    client_max_body_size 16m;

    # DNS embebido de Docker: re-resuelve el backend si su IP cambia (reinicios).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API y media: proxy al backend. El cliente usa rutas relativas, así que el
    # navegador habla siempre con este mismo origen (sin CORS).
    location /api/ {
        set $backend api:8000;
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
    location /media/ {
        set $backend_media api:8000;
        proxy_pass http://$backend_media$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Manifiesto PWA: generado dinámicamente por el backend.
    # Se sirve sin caché para reflejar siempre el nombre/logo/color actuales.
    location = /manifest.webmanifest {
        set $backend_manifest api:8000;
        proxy_pass http://$backend_manifest/manifest.webmanifest;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "no-cache";
    }

    # Módulos JS .mjs (p. ej. el worker de PDF.js) y .wasm: el mime.types de nginx NO mapea
    # esas extensiones, así que se servían como application/octet-stream y el navegador RECHAZA
    # un module script con ese MIME (comprobación estricta de tipo). Forzamos el tipo correcto.
    # Va ANTES que /assets/ porque las locations regex tienen prioridad sobre los prefijos.
    location ~* \.mjs$ {
        default_type text/javascript;
        types { text/javascript mjs; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location ~* \.wasm$ {
        default_type application/wasm;
        types { application/wasm wasm; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Assets con hash de Vite: cache larga (sin `always`, para no cachear errores).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: cualquier ruta del cliente (React Router) cae en index.html.
    # index.html no se cachea para poder desplegar nuevas versiones sin purgar.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
