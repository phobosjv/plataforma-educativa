# Origen SANDBOX en producción tras dominio + TLS (CLAUDE.md §10 / ARCHITECTURE AD-3).
#
# NOTA: el despliegue con docker-compose NO usa este fichero, sino la plantilla
# `nginx/sandbox.conf.template` (frame-ancestors parametrizado por ${APP_ORIGINS}).
# Mantén la CSP de ambos sincronizada.
#
# Sirve los HTML de ejercicios interactivos (content-addressed) desde sandbox.<dominio>,
# un origen distinto al de la app, con CSP estricta. Es el espejo de `app/sandbox.py`:
# la CSP de AMBOS ficheros debe mantenerse sincronizada.
#
# Los ficheros viven en  media/<hash[:2]>/<hash>.html  y se piden como  /ejercicio/<hash>.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;          # volumen ./media montado en read-only
    default_type text/html;
    charset utf-8;

    # Cabeceras de seguridad comunes (espejo de _SECURITY_HEADERS en app/sandbox.py).
    # frame-ancestors debe listar los orígenes de la app autorizados a embeber el iframe.
    add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; media-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors https://app.midominio.es" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    # SIN `always`: la cache inmutable solo se aplica a respuestas correctas (2xx/3xx),
    # para no cachear el 403/404 (el navegador no reintentaría durante 1 año).
    add_header Cache-Control "public, max-age=31536000, immutable";

    # /ejercicio/<hash> -> /<hash[:2]>/<hash>.html
    location ~ "^/ejercicio/(?<h2>[0-9a-f]{2})(?<rest>[0-9a-f]{62})$" {
        try_files /$h2/$h2$rest.html =404;
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"sandbox"}';
    }

    location / {
        return 404;
    }
}
