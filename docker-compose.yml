# Stack de PRODUCCIÓN con Docker + HTTPS automático (Caddy + Let's Encrypt).
#
# Solo Caddy se expone a internet (80/443). frontend, api y sandbox son INTERNOS.
#   https://${APP_DOMAIN}      -> web pública (SPA + /api + /media, vía el nginx del frontend)
#   https://${SANDBOX_DOMAIN}  -> origen aislado de los ejercicios (CLAUDE.md §10)
#
# Antes de levantar:
#   1) Copia .env.example a .env y rellena APP_DOMAIN, SANDBOX_DOMAIN, ACME_EMAIL, SECRET_KEY…
#   2) Crea en tu DNS registros A de APP_DOMAIN y SANDBOX_DOMAIN apuntando a la IP del servidor.
#   3) Redirige en el router los puertos 80 y 443 al servidor.
#   4) docker compose up -d --build
services:
  caddy:
    image: caddy:2-alpine
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - SANDBOX_DOMAIN=${SANDBOX_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      # Subdominios OPCIONALES para paneles de administración (Webmin/Portainer). Si no se
      # definen en el .env, se usa un *.localhost: Caddy lo sirve con cert interno (sin pedirlo
      # a Let's Encrypt) y el bloque del Caddyfile queda inerte. Ver caddy/Caddyfile.
      - WEBMIN_DOMAIN=${WEBMIN_DOMAIN:-webmin.localhost}
      - PORTAINER_DOMAIN=${PORTAINER_DOMAIN:-portainer.localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # certificados (¡persistir para no agotar el rate limit de Let's Encrypt!)
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"         # HTTP/3 (cae a TCP si el UDP está bloqueado)
    extra_hosts:
      # Permite a Caddy alcanzar servicios del HOST (p. ej. Webmin en :10000) vía
      # host.docker.internal. (Portainer, al ser contenedor, se alcanza por la red interna
      # del stack — ver caddy/Caddyfile y connect-portainer.sh, no por aquí.)
      - "host.docker.internal:host-gateway"
    depends_on:
      - frontend
      - sandbox
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    environment:
      # PYTHONPATH: para que alembic/uvicorn importen el paquete `app`.
      - PYTHONPATH=/app
      # Derivados de los dominios (sobre-escriben lo que hubiera en .env):
      - SANDBOX_BASE_URL=https://${SANDBOX_DOMAIN}
      - APP_ORIGINS=https://${APP_DOMAIN}
      - CORS_ALLOW_ORIGINS=https://${APP_DOMAIN}
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  sandbox:
    # Sirve los HTML de ejercicios desde un ORIGEN AISLADO (subdominio distinto), con CSP estricta.
    # frame-ancestors = origen de la app (https://${APP_DOMAIN}), renderizado por envsubst.
    image: nginx:alpine
    environment:
      - APP_ORIGINS=https://${APP_DOMAIN}
      - NGINX_ENVSUBST_FILTER=APP_ORIGINS
    volumes:
      - ./media:/usr/share/nginx/html:ro
      - ./nginx/sandbox.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped

  frontend:
    # Build estático de la SPA servido por nginx; proxya /api y /media al servicio api.
    build: ./frontend
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
